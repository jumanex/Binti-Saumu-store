<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart | Bint Salum store</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <div class="brand">
        <a href="index.html">Bint Salum store</a>
    </div>
    <button class="mobile-menu-button" type="button" onclick="toggleMobileMenu()" aria-label="Fungua menyu">Menu</button>
    <nav class="main-nav">
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="cart.html">Cart</a>
        <a href="admin-login.html">Admin</a>
    </nav>
    <div class="header-actions">
        <a href="cart.html" class="cart-link">Cart <span class="cart-count">0</span></a>
    </div>
</header>

<main class="container">
    <section class="section-intro">
        <span class="eyebrow">Shopping Cart</span>
        <h2>Angalia bidhaa zako zilizoongezwa</h2>
        <p>Fanya mabadiliko kabla ya kuendelea kwenye checkout.</p>
    </section>

    <section class="cart-section">
        <div id="cartItems"></div>
        <div class="cart-summary">
            <h3 id="totalPrice">Total: TZS 0</h3>
            <div class="cart-actions">
                <button onclick="clearCart()" class="btn btn-secondary">Empty Cart</button>
                <a href="checkout.html" id="checkoutButton" class="btn btn-primary">Checkout</a>
            </div>
        </div>
    </section>
</main>

<footer class="site-footer container">
    <div>
        <strong>Bint Salum store</strong>
        <p>© 2026 | Biashara ya mtandaoni kwa bidhaa za afya na urembo.</p>
    </div>
    <nav class="footer-nav">
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="cart.html">Cart</a>
    </nav>
</footer>

<script src="js/script.js"></script>
</body>
</html>
