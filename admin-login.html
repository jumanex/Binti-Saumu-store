<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Binti Saumu store</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <div class="brand">
        <a href="index.html">Binti Saumu store</a>
    </div>
</header>

<main class="container login-page">
    <section class="login-panel">
        <h2>Admin Login</h2>
        <p>Ingiza password yako ili kupata paneli ya orders.</p>
        <form onsubmit="login(event)">
            <div class="password-field">
                <input type="password" id="password" placeholder="Ingiza password" required>
                <button type="button" class="btn btn-secondary password-toggle" onclick="togglePasswordVisibility()">Onyesha</button>
            </div>
            <button type="submit" class="btn btn-primary">Login</button>
        </form>
        <p id="msg" class="error-text"></p>
    </section>
</main>

<footer class="site-footer container">
    <div>
        <strong>Binti Saumu store</strong>
        <p>© 2026 | Admin login kwa biashara mtandaoni.</p>
    </div>
</footer>

<script src="js/script.js"></script>
</body>
</html>
